<!-- vpf002 -->
<script>
document.getElementById('formulario').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch('http://localhost:3000/generar-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            nombre: formData.get('nombre'),
            apellido: formData.get('apellido'),
            calle: formData.get('calle'),
            aField1: formData.get('aField'),
            bField2: formData.get('bField'),
            cField3: formData.get('cField'),
            dField4: formData.get('dField'),
            eField5: formData.get('eField'),
            fField6: formData.get('fField'),
            gField7: formData.get('gField'),
            hField8: formData.get('hField'),
            iField9: formData.get('iField'),
            jField10: formData.get('jField'),
            kField11: formData.get('kField'),
            lField12: formData.get('lField'),
            mField13: formData.get('mField'),
            nField14: formData.get('nField'),
            oField15: formData.get('oField'),
            pField16: formData.get('pField'),
            qField17: formData.get('qField'),
            rField18: formData.get('rField'),
            sField19: formData.get('sField'),
            tField20: formData.get('tField'),            
            uField21: formData.get('uField'),
            vField22: formData.get('vField'),
            wField23: formData.get('wField'),
            xField24: formData.get('xField'),
            yField25: formData.get('yField'),
            zField26: formData.get('zField'),
            aaField27: formData.get('aaField'),
            abField28: formData.get('abField'),
            acField29: formData.get('acField'),
            adField30: formData.get('adField'),
            aeField31: formData.get('aeField'),
            afField32: formData.get('afField'),
            agField33: formData.get('agField'),
            ahField34: formData.get('ahField'),
            aiField35: formData.get('aiField'),
            ajField36: formData.get('ajField'),
            akField37: formData.get('akField'),
            alField38: formData.get('alField'),
        })
    });

    if (!response.ok) {
        alert("Error al generar el PDF");
        return;
    }

    const blob = await response.blob();
    const link = document.createElement('a');
    link.href = window.URL.createObjectURL(blob);
    link.download = 'VPF002.pdf';
    link.click();
});
</script>
